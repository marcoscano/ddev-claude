#ddev-generated
services:
  claude:
    build:
      context: claude
      dockerfile: Dockerfile.claude
      args:
        # Match the web container's PHP version (fallback for older DDEV
        # versions that do not provide DDEV_PHP_VERSION to compose files).
        PHP_VERSION: ${DDEV_PHP_VERSION:-8.3}
    container_name: ddev-${DDEV_SITENAME}-claude

    cap_add:
      - NET_ADMIN
      - NET_RAW

    entrypoint: ["${DDEV_APPROOT}/.ddev/claude/entrypoint.sh"]
    # Keep-alive that also re-resolves the firewall whitelist periodically:
    # ipset entries are added with a 3600s timeout but are only re-resolved
    # when a whitelist file changes, so after 1h of uptime all egress would
    # silently drop. Re-adding entries resets their TTL.
    command:
      - bash
      - -c
      - |
        echo "[ddev-claude] Whitelist refresh loop active (every 1800s)"
        while true; do
          sleep 1800
          "${DDEV_APPROOT}/.ddev/claude/scripts/reload-whitelist.sh" \
            || echo "[ddev-claude] WARNING: whitelist reload failed; retrying in 1800s"
        done

    volumes:
      - type: bind
        source: ${DDEV_APPROOT}
        target: ${DDEV_APPROOT}
        consistency: cached
      # Also mount the project at the web container's canonical path so drush
      # site aliases (root: /var/www/html/web) resolve here too, and absolute
      # paths baked into caches shared through the database stay consistent
      # with the web container.
      - type: bind
        source: ${DDEV_APPROOT}
        target: /var/www/html
        consistency: cached
      # Mask project env files inside claude container (both mount points)
      - type: bind
        source: ${DDEV_APPROOT}/.ddev/claude/config/empty.env
        target: ${DDEV_APPROOT}/.env
        read_only: true
      - type: bind
        source: ${DDEV_APPROOT}/.ddev/claude/config/empty.env
        target: ${DDEV_APPROOT}/.ddev/.env
        read_only: true
      - type: bind
        source: ${DDEV_APPROOT}/.ddev/claude/config/empty.env
        target: /var/www/html/.env
        read_only: true
      - type: bind
        source: ${DDEV_APPROOT}/.ddev/claude/config/empty.env
        target: /var/www/html/.ddev/.env
        read_only: true
      - ~/.claude:/root/.claude:rw
      - ~/.claude.json:/root/.claude.json:rw
      - ~/.claude:/home/claude/.claude:rw
      - ~/.claude.json:/home/claude/.claude.json:rw
      # Keep host-absolute plugin install paths valid inside container
      - ${HOME}/.claude:${HOME}/.claude:rw
      # Git identity for commits inside container
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.config/git:/root/.config/git:ro
      - ~/.gitconfig:/home/claude/.gitconfig:ro
      - ~/.config/git:/home/claude/.config/git:ro

    working_dir: ${DDEV_APPROOT}

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DDEV_APPROOT=${DDEV_APPROOT}
      # Make Drupal's settings.php include settings.ddev.php (DB credentials
      # etc.) so drush and other CLI tools work inside this container.
      - IS_DDEV_PROJECT=true
      # DDEV-standard variable inside containers: lets settings files and CLI
      # tools distinguish in-container execution from drush on the host.
      - DDEV_PHP_VERSION=${DDEV_PHP_VERSION:-8.3}
      - CLAUDE_USER=claude
      - CLAUDE_HOME=/home/claude

    networks:
      - default

    healthcheck:
      test: ["CMD-SHELL", "${DDEV_APPROOT}/.ddev/claude/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}

networks:
  default:
    name: ddev_default
    external: true
